name: Multi-Runner CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: echo "Build on GitHub-hosted runner"

  test:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Tests
        run: echo "Tests on self-hosted Linux runner"

  deploy:
    runs-on: [self-hosted, deploy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy
        run: echo "Deploying from deploy runner"
